name: Deploy Expo Web to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_WORKOS_CLIENT_ID: ${{ vars.EXPO_PUBLIC_WORKOS_CLIENT_ID }}
      EXPO_PUBLIC_WORKOS_API_HOSTNAME: ${{ vars.EXPO_PUBLIC_WORKOS_API_HOSTNAME }}
      EXPO_PUBLIC_WORKOS_REDIRECT_SCHEME: ${{ vars.EXPO_PUBLIC_WORKOS_REDIRECT_SCHEME }}
      EXPO_PUBLIC_WORKOS_REDIRECT_PATH: ${{ vars.EXPO_PUBLIC_WORKOS_REDIRECT_PATH }}
      EXPO_PUBLIC_WORKOS_ORGANIZATION_ID: ${{ vars.EXPO_PUBLIC_WORKOS_ORGANIZATION_ID || '' }}
      EXPO_PUBLIC_WORKOS_CONNECTION_ID: ${{ vars.EXPO_PUBLIC_WORKOS_CONNECTION_ID || '' }}
      EXPO_PUBLIC_WORKOS_DOMAIN_HINT: ${{ vars.EXPO_PUBLIC_WORKOS_DOMAIN_HINT || '' }}
      EXPO_PUBLIC_WORKOS_LOGIN_HINT: ${{ vars.EXPO_PUBLIC_WORKOS_LOGIN_HINT || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Export Expo web build
        run: npx expo export -p web

      - name: Add 404 fallback and disable Jekyll
        run: |
          cp dist/+not-found.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
