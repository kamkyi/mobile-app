services:
  mobile:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "1"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: npm run start:docker
